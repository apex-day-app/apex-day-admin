<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ============================================ -->
    <!-- SECTION 1: DOCUMENT HEAD & META TAGS        -->
    <!-- ============================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Day - Admin Panel</title>
    
    <!-- ======================================== -->
    <!-- SECTION 2: FONT AWESOME 6               -->
    <!-- ======================================== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ======================================== -->
    <!-- SECTION 3: GOOGLE FONTS                 -->
    <!-- ======================================== -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ======================================== -->
    <!-- SECTION 4: FIREBASE SDK                  -->
    <!-- ======================================== -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- ============================================ -->
    <!-- SECTION 5: ADMIN APP STYLES                  -->
    <!-- ============================================ -->
    <style>
        /* ======================================== */
        /* SECTION 5.1: GLOBAL RESET                */
        /* ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        /* ======================================== */
        /* SECTION 5.2: BODY STYLES                 */
        /* ======================================== */
        body {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* ======================================== */
        /* SECTION 5.3: LOGIN PAGE STYLES           */
        /* ======================================== */
        .login-container {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #D4AF37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header i {
            font-size: 4rem;
            color: #D4AF37;
            margin-bottom: 10px;
        }
        
        .login-header h2 {
            color: #fff;
            font-size: 2rem;
        }
        
        .login-header p {
            color: #D4AF37;
            font-size: 0.9rem;
        }
        
        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #D4AF37;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
        }
        
        .login-input:focus {
            outline: none;
            border-color: #FFD700;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
        
        .login-error {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        
        /* ======================================== */
        /* SECTION 5.4: ADMIN DASHBOARD STYLES      */
        /* ======================================== */
        .admin-container {
            width: 100%;
            max-width: 1200px;
            display: none;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #D4AF37;
        }
        
        .admin-header h1 {
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .admin-header h1 i {
            color: #D4AF37;
        }
        
        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        
        /* ======================================== */
        /* SECTION 5.5: STATS CARDS                 */
        /* ======================================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #D4AF37;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #000;
        }
        
        .stat-info h3 {
            color: #D4AF37;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .stat-info p {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
        }
        
        /* ======================================== */
        /* SECTION 5.6: QUICK ACTIONS               */
        /* ======================================== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .action-card {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid #D4AF37;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        
        .action-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #000;
        }
        
        .action-title {
            color: #D4AF37;
            font-weight: 600;
        }
        
        .action-desc {
            color: #fff;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        /* ======================================== */
        /* SECTION 5.7: SEARCH BAR                  */
        /* ======================================== */
        .search-bar {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #D4AF37;
            display: flex;
            gap: 10px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 12px;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #D4AF37;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        
        .search-bar button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* ======================================== */
        /* SECTION 5.8: USERS TABLE                 */
        /* ======================================== */
        .users-table {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #D4AF37;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #D4AF37;
            color: #000;
            padding: 12px;
            text-align: left;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #D4AF37;
            color: #fff;
        }
        
        .user-row:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        
        .badge {
            background: #D4AF37;
            color: #000;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .action-btn {
            padding: 6px 12px;
            margin: 0 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .add-btn {
            background: #00C853;
            color: white;
        }
        
        /* ======================================== */
        /* SECTION 5.9: MODAL STYLES                */
        /* ======================================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #D4AF37;
        }
        
        .modal-content h3 {
            color: #D4AF37;
            margin-bottom: 20px;
        }
        
        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #D4AF37;
            border-radius: 8px;
            color: #fff;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .save-btn {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #000;
        }
        
        .cancel-btn {
            background: #666;
            color: white;
        }
        
        /* ======================================== */
        /* SECTION 5.10: LOADING STYLES             */
        /* ======================================== */
        .loading {
            text-align: center;
            color: #D4AF37;
            padding: 40px;
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        /* ======================================== */
        /* SECTION 5.11: RESPONSIVE STYLES          */
        /* ======================================== */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: 1fr;
            }
            
            .search-bar {
                flex-direction: column;
            }
            
            table {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================ -->
    <!-- SECTION 6: LOGIN PAGE                        -->
    <!-- ============================================ -->
    <div class="login-container" id="loginPage">
        <!-- SECTION 6.1: LOGIN HEADER -->
        <div class="login-header">
            <i class="fas fa-crown"></i>
            <h2>Admin Panel</h2>
            <p>Apex Day Game</p>
        </div>
        
        <!-- SECTION 6.2: LOGIN FORM -->
        <input type="password" id="adminPassword" class="login-input" placeholder="Enter Password" onkeypress="checkEnter(event)">
        <button class="login-btn" onclick="adminLogin()">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
        <div class="login-error" id="loginError">Wrong password!</div>
    </div>
    
    <!-- ============================================ -->
    <!-- SECTION 7: ADMIN DASHBOARD                   -->
    <!-- ============================================ -->
    <div class="admin-container" id="adminDashboard">
        
        <!-- SECTION 7.1: ADMIN HEADER -->
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Apex Day Admin</h1>
            <button class="logout-btn" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <!-- SECTION 7.2: STATS CARDS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3>Total Users</h3>
                    <p id="totalUsers">0</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-wallet"></i></div>
                <div class="stat-info">
                    <h3>Total Balance</h3>
                    <p id="totalBalance">₹0</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-gamepad"></i></div>
                <div class="stat-info">
                    <h3>Games Today</h3>
                    <p id="gamesToday">0</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <h3>Active Now</h3>
                    <p id="activeNow">0</p>
                </div>
            </div>
        </div>
        
        <!-- SECTION 7.3: QUICK ACTIONS -->
        <div class="quick-actions">
            <div class="action-card" onclick="showAddUserModal()">
                <div class="action-icon"><i class="fas fa-user-plus"></i></div>
                <div>
                    <div class="action-title">Add User</div>
                    <div class="action-desc">Create new user</div>
                </div>
            </div>
            
            <div class="action-card" onclick="refreshData()">
                <div class="action-icon"><i class="fas fa-sync-alt"></i></div>
                <div>
                    <div class="action-title">Refresh</div>
                    <div class="action-desc">Update data</div>
                </div>
            </div>
        </div>
        
        <!-- SECTION 7.4: SEARCH BAR -->
        <div class="search-bar">
            <input type="text" id="searchUser" placeholder="Search by User ID or Name..." onkeyup="searchUsers()">
            <button onclick="loadUsers()"><i class="fas fa-search"></i> Search</button>
        </div>
        
        <!-- SECTION 7.5: USERS TABLE -->
        <div class="users-table">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Balance</th>
                        <th>Wins</th>
                        <th>Games</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr>
                        <td colspan="7" class="loading">
                            <i class="fas fa-spinner fa-spin"></i><br>
                            Loading users...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- SECTION 8: ADD BALANCE MODAL                 -->
    <!-- ============================================ -->
    <div class="modal" id="balanceModal">
        <div class="modal-content">
            <h3><i class="fas fa-coins"></i> Add Balance</h3>
            <p style="color: #fff; margin-bottom: 10px;" id="modalUserName"></p>
            <input type="number" id="modalAmount" class="modal-input" placeholder="Enter amount">
            <div class="modal-buttons">
                <button class="modal-btn save-btn" onclick="updateBalance()">Add</button>
                <button class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- SECTION 9: ADD USER MODAL                    -->
    <!-- ============================================ -->
    <div class="modal" id="addUserModal">
        <div class="modal-content">
            <h3><i class="fas fa-user-plus"></i> Add New User</h3>
            <input type="text" id="newUserName" class="modal-input" placeholder="Full Name">
            <input type="text" id="newUserId" class="modal-input" placeholder="Telegram ID">
            <input type="number" id="newUserBalance" class="modal-input" placeholder="Initial Balance" value="1000">
            <div class="modal-buttons">
                <button class="modal-btn save-btn" onclick="addUser()">Create</button>
                <button class="modal-btn cancel-btn" onclick="closeAddUserModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- SECTION 10: FIREBASE CONFIGURATION           -->
    <!-- ============================================ -->
    <script>
        // ======================================== -->
        // SECTION 10.1: FIREBASE CONFIG
        // ======================================== -->
        const firebaseConfig = {
            apiKey: "AIzaSyC9DvVCuyQ6m_gSFE7Eg-JuhB0TaDWxq2I",
            authDomain: "apex-day-admin.firebaseapp.com",
            projectId: "apex-day-admin",
            storageBucket: "apex-day-admin.firebasestorage.app",
            messagingSenderId: "249071602257",
            appId: "1:249071602257:web:725a9f412e5974333c4670"
        };
        
        // ======================================== -->
        // SECTION 10.2: INITIALIZE FIREBASE
        // ======================================== -->
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ======================================== -->
        // SECTION 10.3: ADMIN CONFIG
        // ======================================== -->
        const ADMIN_PASSWORD = 'apex@2025';
        let currentEditUser = null;
        
        // ============================================ -->
        // SECTION 11: LOGIN FUNCTIONS                  -->
        // ============================================ -->
        
        // SECTION 11.1: ADMIN LOGIN
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadUsers();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('loginError').style.display = 'none';
                }, 3000);
            }
        }
        
        // SECTION 11.2: ENTER KEY HANDLER
        function checkEnter(event) {
            if (event.key === 'Enter') {
                adminLogin();
            }
        }
        
        // SECTION 11.3: ADMIN LOGOUT
        function adminLogout() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }
        
        // ============================================ -->
        // SECTION 12: USER MANAGEMENT FUNCTIONS        -->
        // ============================================ -->
        
        // SECTION 12.1: LOAD USERS FROM FIREBASE
        async function loadUsers() {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '<tr><td colspan="7" class="loading"><i class="fas fa-spinner fa-spin"></i><br>Loading users...</td></tr>';
            
            try {
                const snapshot = await db.collection('users').get();
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="7" style="color: #D4AF37; text-align: center;">No users found. Add your first user!</td></tr>';
                    updateStats([]);
                    return;
                }
                
                let users = [];
                snapshot.forEach(doc => {
                    users.push({ id: doc.id, ...doc.data() });
                });
                
                displayUsers(users);
                updateStats(users);
                
            } catch (error) {
                console.error("Error loading users:", error);
                tbody.innerHTML = '<tr><td colspan="7" style="color: #ff4444; text-align: center;">Error loading users! Check Firebase config.</td></tr>';
            }
        }
        
        // SECTION 12.2: DISPLAY USERS IN TABLE
        function displayUsers(users) {
            const tbody = document.getElementById('usersList');
            let html = '';
            
            users.forEach(user => {
                const status = user.balance > 0 ? 
                    '<span class="badge" style="background: #00C853;">Active</span>' : 
                    '<span class="badge" style="background: #666;">Inactive</span>';
                
                html += `<tr class="user-row" id="user-${user.id}">
                    <td><code>${user.id}</code></td>
                    <td>${user.name || 'Unknown'}</td>
                    <td><span style="color: #D4AF37; font-weight: 600;">₹${user.balance || 0}</span></td>
                    <td>${user.wins || 0}</td>
                    <td>${user.games || 0}</td>
                    <td>${status}</td>
                    <td>
                        <button class="action-btn add-btn" onclick="openBalanceModal('${user.id}', '${user.name || 'User'}', ${user.balance || 0})">
                            <i class="fas fa-plus-circle"></i> Add
                        </button>
                    </td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
        }
        
        // SECTION 12.3: UPDATE STATS
        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            
            const totalBal = users.reduce((sum, u) => sum + (u.balance || 0), 0);
            document.getElementById('totalBalance').textContent = '₹' + totalBal;
            
            document.getElementById('gamesToday').textContent = '0';
            document.getElementById('activeNow').textContent = '0';
        }
        
        // SECTION 12.4: SEARCH USERS
        function searchUsers() {
            const search = document.getElementById('searchUser').value.toLowerCase();
            
            db.collection('users').get().then(snapshot => {
                const users = [];
                snapshot.forEach(doc => {
                    const user = { id: doc.id, ...doc.data() };
                    if (user.id.includes(search) || (user.name && user.name.toLowerCase().includes(search))) {
                        users.push(user);
                    }
                });
                displayUsers(users);
            });
        }
        
        // SECTION 12.5: REFRESH DATA
        function refreshData() {
            loadUsers();
        }
        
        // ============================================ -->
        // SECTION 13: BALANCE FUNCTIONS                -->
        // ============================================ -->
        
        // SECTION 13.1: OPEN BALANCE MODAL
        function openBalanceModal(userId, userName, currentBalance) {
            currentEditUser = { id: userId, name: userName };
            document.getElementById('modalUserName').innerHTML = 
                `User: <b>${userName}</b><br>Current: ₹${currentBalance}`;
            document.getElementById('balanceModal').style.display = 'flex';
        }
        
        // SECTION 13.2: CLOSE MODAL
        function closeModal() {
            document.getElementById('balanceModal').style.display = 'none';
            document.getElementById('modalAmount').value = '';
        }
        
        // SECTION 13.3: UPDATE BALANCE IN FIREBASE
        async function updateBalance() {
            const amount = parseInt(document.getElementById('modalAmount').value);
            if (!amount || amount < 1) {
                alert('Please enter valid amount!');
                return;
            }
            
            try {
                const userRef = db.collection('users').doc(currentEditUser.id);
                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(amount)
                });
                
                alert(`✅ Added ₹${amount} to ${currentEditUser.name}`);
                closeModal();
                loadUsers();
                
            } catch (error) {
                console.error("Error updating balance:", error);
                alert('❌ Error updating balance!');
            }
        }
        
        // ============================================ -->
        // SECTION 14: ADD USER FUNCTIONS               -->
        // ============================================ -->
        
        // SECTION 14.1: SHOW ADD USER MODAL
        function showAddUserModal() {
            document.getElementById('addUserModal').style.display = 'flex';
        }
        
        // SECTION 14.2: CLOSE ADD USER MODAL
        function closeAddUserModal() {
            document.getElementById('addUserModal').style.display = 'none';
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserId').value = '';
            document.getElementById('newUserBalance').value = '1000';
        }
        
        // SECTION 14.3: ADD USER TO FIREBASE
        async function addUser() {
            const name = document.getElementById('newUserName').value.trim();
            const userId = document.getElementById('newUserId').value.trim();
            const balance = parseInt(document.getElementById('newUserBalance').value) || 1000;
            
            if (!name || !userId) {
                alert('Please fill all fields!');
                return;
            }
            
            try {
                await db.collection('users').doc(userId).set({
                    name: name,
                    balance: balance,
                    wins: 0,
                    games: 0,
                    joined: new Date().toISOString().split('T')[0]
                });
                
                alert(`✅ User ${name} created with ₹${balance}`);
                closeAddUserModal();
                loadUsers();
                
            } catch (error) {
                console.error("Error adding user:", error);
                alert('❌ Error creating user!');
            }
        }
        
        // ============================================ -->
        // SECTION 15: INITIALIZATION                   -->
        // ============================================ -->
        window.onload = function() {
            // Auto login for demo (remove in production)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auto') === '1') {
                adminLogin();
            }
        };
    </script>
</body>
</html>
